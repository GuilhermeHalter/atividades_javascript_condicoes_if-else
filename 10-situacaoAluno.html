<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Situação Aluno</title>
</head>
<body>
    <script type="text/javascript">

        const porcentfaltas = Number(prompt("quantos porcento o aluno compareceu as aulas?"))
        const falta = (porcentfaltas / 100) * 365 ;
        const media = Number(prompt("qual a media do aluno ?"))

        if (falta <= 91.25){
            document.write("O aluno está reprovado por falta (RF)")
        } else if ((media < 7) && (falta >= 273.75)) {
            document.write("O aluno está em exame final (EF)")
        }else {
            document.write("O aluno está aprovado (AP)")
        }

    </script>
</body>
</html>
