<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maioridade</title>
</head>
<body>
    
    <script type="text/javascript">

        const idade = Number(prompt("Informe a idade "));

        if (idade < 18){
            document.write("A pessoa tem ", idade, ". Essa pessoa é menor de idade");
        } else {
            document.write("A pessoa tem ", idade, " . Essa pessoa é maior de idade");
        }

    </script>

</body>
</html>
