<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triangulos</title>
</head>
<body>

    <script type="text/javascript">

    const lado1 = Number(prompt("Digite um número"))
    const lado2 = Number(prompt("Digite um número"))
    const lado3 = Number(prompt("Digite um número"))

    if (lado1 == lado2 && lado1 == lado3){
        document.write("Esse é um triangulo equilatero ")
    }else if (lado1 == lado2 && lado1 < lado3) {
        document.write("Esse é um triangulo isóceles")
    }else if (lado1 == lado3 && lado1 < lado2) {
        document.write("Esse é um triangulo isóceles")
    }else {
        document.write("Esse é um triangulo escaleno")
    }

    </script>
    
</body>
</html>
