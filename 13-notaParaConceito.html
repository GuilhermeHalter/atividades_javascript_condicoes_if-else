<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nota para conceito</title>
</head>
<body>
    
<script type="text/javascript">

    const nota = Number(prompt("Digite sua nota"));

    if (nota <= 5.9){
        document.write("sua nota foi 'E'");
    }else if (nota <= 6.9){
        document.write("sua nota foi 'D'");
    }else if (nota <= 7.9){
        document.write("sua nota foi 'C'");
    }else if (nota <= 8.9){
        document.write("sua nota foi 'B'");
    }else{
        document.write("sua nota foi 'A'");
    }

</script>

</body>
</html>
